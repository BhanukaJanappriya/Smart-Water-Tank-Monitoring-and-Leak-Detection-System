openapi: 3.0.0
info:
  title: Smart Water Tank Monitoring & Leak Detection API
  description: API for retrieving real-time water levels from ESP32, computing historical trends, and managing leak detection alerts.
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local development backend server
paths:
  /api/tank/latest:
    get:
      summary: Get latest processed sensor metrics
      description: Returns the most recent processed sensor metrics formatted for dashboard cards.
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LatestReading'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/tank/history:
    get:
      summary: Get historical readings
      description: Returns chronological readings for chart rendering.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 100
          required: false
          description: Maximum number of history items to return.
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistoryReading'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/tank/raw/ultrasonic:
    get:
      summary: Get raw ultrasonic distance reading
      description: Returns raw ultrasonic distance values (rawDistanceCm).
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RawUltrasonicReading'

  /api/tank/raw/temperature:
    get:
      summary: Get raw temperature reading
      description: Returns raw temperature measurements (temperatureC).
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RawTemperatureReading'

  /api/tank/raw/rain:
    get:
      summary: Get raw rain detection status
      description: Returns raw precipitation status values (isRaining).
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RawRainReading'

components:
  schemas:
    LatestReading:
      type: object
      required:
        - waterLevel
        - tankPercentage
        - temperature
        - isRaining
        - timestamp
      properties:
        waterLevel:
          type: number
          description: Current water depth in centimeters
          example: 44.8
        tankPercentage:
          type: integer
          description: Water depth as percentage of full capacity (rounded to nearest integer)
          example: 56
        temperature:
          type: number
          description: Current temperature in Celsius
          example: 24.5
        isRaining:
          type: boolean
          description: Status indicating whether it is raining
          example: false
        timestamp:
          type: string
          format: date-time
          example: '2026-06-21T13:40:00.000Z'

    HistoryReading:
      type: object
      required:
        - waterLevel
        - tankPercentage
        - temperature
        - isRaining
        - timestamp
      properties:
        waterLevel:
          type: number
          description: Historical water depth in centimeters
          example: 44.8
        tankPercentage:
          type: integer
          description: Historical water depth as percentage of full capacity
          example: 56
        temperature:
          type: number
          description: Historical temperature in Celsius
          example: 24.5
        isRaining:
          type: boolean
          description: Historical rain status
          example: false
        timestamp:
          type: string
          format: date-time
          example: '2026-06-21T13:40:00.000Z'

    RawUltrasonicReading:
      type: object
      required:
        - sensor
        - status
        - timestamp
      properties:
        sensor:
          type: string
          example: 'Ultrasonic Sensor'
        rawDistanceCm:
          type: number
          nullable: true
          example: 4.0
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time
          example: '2026-06-21T13:40:00.000Z'

    RawTemperatureReading:
      type: object
      required:
        - sensor
        - status
        - timestamp
      properties:
        sensor:
          type: string
          example: 'Temperature Sensor'
        temperatureC:
          type: number
          nullable: true
          example: 28.1
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time
          example: '2026-06-21T13:40:00.000Z'

    RawRainReading:
      type: object
      required:
        - sensor
        - isRaining
        - status
        - timestamp
      properties:
        sensor:
          type: string
          example: 'Raindrop Sensor'
        isRaining:
          type: boolean
          example: false
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time
          example: '2026-06-21T13:40:00.000Z'

    ErrorResponse:
      type: object
      required:
        - success
        - error
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: 'Database query failed'
